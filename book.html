<html lang="sq">
<head>
<meta charset="UTF-8">

<script>(function(){try{var t=localStorage.getItem('ob-theme');if(!t)t=(window.matchMedia&&matchMedia('(prefers-color-scheme: dark)').matches)?'dark':'light';document.documentElement.setAttribute('data-theme',t);}catch(e){}})();</script>

<title>OptimaBook — Rezervo / Porosit</title>
<meta name="robots" content="noindex">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="preload" href="fonts/manrope-latin.woff2" as="font" type="font/woff2" crossorigin>
<link rel="preload" href="fonts/sora-latin.woff2" as="font" type="font/woff2" crossorigin>
<link rel="stylesheet" href="style.css?v=126">
<style>
  .pub-wrap { max-width: 560px; margin: 30px auto 80px; padding: 0 16px; }
  .pub-card { background: var(--glass); backdrop-filter: blur(30px) saturate(1.6); -webkit-backdrop-filter: blur(30px) saturate(1.6);
    border: 1px solid var(--glass-edge); border-radius: var(--r-xl); box-shadow: var(--shadow-float); padding: 28px 24px; }
  .pub-biz { font-family: var(--font-display); font-size: 24px; font-weight: 800; letter-spacing: -.03em; }
  .pub-addr { color: var(--ink-soft); font-weight: 600; font-size: 13.5px; margin-top: 3px; }
  .pub-sec { font-family: var(--font-display); font-weight: 800; font-size: 14px; margin: 22px 0 10px; }
  .pub-switch { display: flex; gap: 6px; margin: 18px 0 6px; background: var(--glass-soft); border: 1px solid var(--glass-edge); border-radius: 14px; padding: 5px; }
  .pub-sw { flex: 1; border: none; background: none; color: var(--ink-soft); font-family: var(--font-body); font-weight: 800; font-size: 14px; padding: 10px; border-radius: 10px; cursor: pointer; transition: all .18s; }
  .pub-sw.active { background: linear-gradient(160deg, var(--accent-bright), var(--accent)); color: #fff; box-shadow: 0 4px 12px var(--accent-glow); }
  .pub-card label.f { display: block; font-weight: 800; font-size: 12px; text-transform: uppercase; letter-spacing: .06em; color: var(--ink-soft); margin: 14px 0 6px; }
  .pub-card input, .pub-card select, .pub-card textarea { width: 100%; font-family: var(--font-body); border: 1px solid var(--glass-edge);
    background: var(--glass-soft); border-radius: var(--r-sm); padding: 12px 13px; font-size: 14.5px; font-weight: 600; color: var(--ink); outline: none; }
  .pub-card input:focus, .pub-card select:focus, .pub-card textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3.5px var(--accent-soft); }
  .slots { display: grid; grid-template-columns: repeat(auto-fill, minmax(72px, 1fr)); gap: 8px; margin-top: 6px; }
  .slot-btn { border: 1px solid var(--glass-edge); background: var(--glass-soft); color: var(--ink); border-radius: var(--r-sm);
    padding: 9px 6px; font-weight: 700; font-size: 13.5px; cursor: pointer; transition: all .14s; }
  .slot-btn:hover { transform: translateY(-1px); }
  .slot-btn.sel { background: linear-gradient(160deg, var(--accent-bright), var(--accent)); color: #fff; border-color: transparent; }
  .pub-item { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--glass-line); }
  .pub-item:last-child { border-bottom: none; }
  .pi-grow { flex: 1; min-width: 0; }
  .pi-name { font-weight: 800; font-size: 14.5px; }
  .pi-desc { font-size: 12.5px; color: var(--ink-soft); font-weight: 600; margin-top: 2px; }
  .pi-price { font-weight: 800; color: var(--accent-deep); font-size: 13.5px; margin-top: 2px; }
  .qty { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
  .qty button { width: 30px; height: 30px; border-radius: 9px; border: 1px solid var(--glass-edge); background: var(--glass-strong);
    color: var(--ink); font-size: 17px; font-weight: 800; cursor: pointer; line-height: 1; }
  .qty span { min-width: 22px; text-align: center; font-weight: 800; }
  .pi-addons { margin-top: 7px; display: flex; flex-direction: column; gap: 5px; }
  .pi-addon { display: flex; align-items: center; gap: 7px; font-size: 13px; color: var(--ink-soft); font-weight: 600; cursor: pointer; }
  .pi-addon input { width: auto; }
  .pi-addon.req { color: var(--accent-deep); cursor: default; }
  .cart-total { display: flex; justify-content: space-between; align-items: center; margin: 18px 0 4px; font-family: var(--font-display); font-weight: 800; font-size: 18px; }
  .cart-total b { color: var(--accent-deep); }
  .pub-msg { text-align: center; padding: 30px 16px; }
  .pub-msg .big { font-size: 46px; }
  .pub-msg h2 { font-family: var(--font-display); margin: 10px 0 6px; }
  .pub-msg p { color: var(--ink-soft); font-weight: 600; }
  .pub-foot { text-align: center; margin-top: 18px; font-size: 12px; color: var(--ink-faint); font-weight: 600; }
  .pub-foot a { color: var(--accent-deep); text-decoration: none; font-weight: 800; }
  .pub-err { color: var(--red); font-weight: 700; font-size: 13.5px; margin-top: 10px; min-height: 18px; }

  /* ===== WOW PASS — faqja publike (klientët, mobile-first) ===== */
  .pub-card { animation: pubIn .5s cubic-bezier(.2,.7,.3,1); position: relative; }
  @keyframes pubIn { from { opacity: 0; transform: translateY(14px) scale(.99); } to { opacity: 1; transform: none; } }
  .pub-card::before { content: ""; position: absolute; inset: 0 0 auto 0; height: 160px; border-radius: inherit; pointer-events: none; z-index: 0;
    background: radial-gradient(70% 130% at 28% 0%, var(--accent-glow), transparent 68%); opacity: .55; }
  .pub-card > * { position: relative; z-index: 1; }
  .pub-biz { background: linear-gradient(110deg, var(--ink) 8%, var(--accent) 135%); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
  .pub-sw { transition: all .2s cubic-bezier(.22,.61,.36,1); }
  .pub-sw:active { transform: scale(.96); }
  .slot-btn { animation: slotIn .3s ease both; }
  @keyframes slotIn { from { opacity: 0; transform: scale(.92); } }
  .slot-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 18px -6px var(--accent-glow); }
  .slot-btn.sel { box-shadow: 0 9px 22px -4px var(--accent-glow); transform: translateY(-1px); }
  .qty button { transition: transform .14s ease, background .18s ease, color .18s ease; }
  .qty button:active { transform: scale(.86); }
  .qty button[data-p] { border-color: var(--accent); color: var(--accent-deep); }
  .qty button[data-p]:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
  .cart-total { padding: 14px 16px; border-radius: 14px; background: var(--accent-soft); margin-top: 18px; }
  .pub-msg .big { display: inline-block; animation: okPop .55s cubic-bezier(.2,1.4,.4,1); }
  @keyframes okPop { from { transform: scale(0) rotate(-12deg); opacity: 0; } to { transform: none; opacity: 1; } }

  @media (max-width: 560px) {
    .pub-wrap { margin: 0 auto; padding: 0; max-width: 100%; }
    .pub-card { border-radius: 0; min-height: 100dvh; padding: calc(24px + env(safe-area-inset-top)) max(16px,env(safe-area-inset-left)) calc(94px + env(safe-area-inset-bottom)) max(16px,env(safe-area-inset-right)); border-left: 0; border-right: 0; box-shadow: none; }
    .pub-biz { font-size: 22px; }
    .slots { grid-template-columns: repeat(auto-fill, minmax(82px, 1fr)); gap: 9px; }
    .slot-btn { padding: 13px 6px; font-size: 14.5px; }
    .qty button { width: 38px; height: 38px; font-size: 20px; }
    .pub-card input, .pub-card select, .pub-card textarea { padding: 14px 13px; font-size: 16px; } /* 16px → pa zoom automatik në iOS */
    .pub-card .btn.primary.big { position: sticky; bottom: calc(12px + env(safe-area-inset-bottom)); z-index: 5; box-shadow: 0 12px 32px -6px var(--accent-glow); }
    .pub-foot { padding-bottom: calc(14px + env(safe-area-inset-bottom)); }
  }
  @media (prefers-reduced-motion: reduce) { .pub-card, .slot-btn, .pub-msg .big { animation: none !important; } }
</style>
</head>
<body>
<div class="pub-wrap">
  <div class="pub-card" id="card">
    <div class="pub-msg"><div class="big">⏳</div><p id="loadingTxt">Po ngarkohet…</p></div>
  </div>
  <div class="pub-foot">⚡ <span id="poweredTxt">Mundësuar nga</span> <a href="index.html">OptimaBook</a></div>
</div>

<script>(function(){var v=new URLSearchParams(location.search).get('v');document.write('<script src="core.js'+(v?'?v='+encodeURIComponent(v):'')+'"><\/script>');})();</script>
<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";
import { SUPABASE_URL, SUPABASE_KEY } from "./config.js";
const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

const CUR = { EUR:"€", USD:"$", GBP:"£", ALL:"L", CHF:"CHF", CAD:"$", AUD:"$", AED:"AED", TRY:"₺", RSD:"din", MKD:"den", RON:"lei", BGN:"лв", SEK:"kr", INR:"₹", JPY:"¥", CNY:"¥" };
let DATA = null, SQ = true;
const $ = (s) => document.querySelector(s);
const esc = (s) => String(s == null ? "" : s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
const pad = (n) => String(n).padStart(2, "0");
function sym() { return CUR[(DATA && DATA.currency) || "EUR"] || (DATA && DATA.currency) || "€"; }
function money(n) { const v = Math.round((Number(n) || 0) * 100) / 100; const s = sym(); return s.length === 1 ? v + s : v + " " + s; }
const T = {
  sq: { loading:"Po ngarkohet…", notfound:"Biznesi nuk u gjet.", powered:"Mundësuar nga", book:"Rezervo takim", order:"Bëj porosinë",
    service:"Shërbimi", date:"Data", pickSlot:"Zgjedh orarin", noSlots:"S'ka orare të lira këtë ditë.", closed:"Mbyllur këtë ditë.",
    name:"Emri yt", phone:"Telefoni", contact:"Telefon / email", notes:"Shënime (opsionale)", total:"Totali", send:"Dërgo",
    okBook:"U rezervua! 🎉", okBookP:"Pronari do ta konfirmojë së shpejti.", okOrder:"Porosia u dërgua! 🎉", okOrderP:"Pronari do të kontaktojë së shpejti.",
    needName:"Shkruaj emrin.", needSlot:"Zgjedh një orar.", needItems:"Zgjedh të paktën një artikull.", slotTaken:"Ky orar sapo u zu — zgjedh një tjetër.", failed:"Diçka shkoi keq. Provo sërish.", rate:"Shumë kërkesa njëherësh — prit pak dhe provo sërish.", another:"Bëj një tjetër", track:"📦 Gjurmo statusin", addonInc:"përfshihet" },
  en: { loading:"Loading…", notfound:"Business not found.", powered:"Powered by", book:"Book an appointment", order:"Place your order",
    service:"Service", date:"Date", pickSlot:"Pick a time", noSlots:"No free times this day.", closed:"Closed this day.",
    name:"Your name", phone:"Phone", contact:"Phone / email", notes:"Notes (optional)", total:"Total", send:"Send",
    okBook:"Booked! 🎉", okBookP:"The owner will confirm shortly.", okOrder:"Order sent! 🎉", okOrderP:"The owner will contact you shortly.",
    needName:"Enter your name.", needSlot:"Pick a time.", needItems:"Pick at least one item.", slotTaken:"That slot was just taken — pick another.", failed:"Something went wrong. Try again.", rate:"Too many requests at once — wait a moment and try again.", another:"Make another", track:"📦 Track status", addonInc:"included" },
};
const tr = (k) => (SQ ? T.sq : T.en)[k];

const cart = {}; // service_id -> qty
const cartAddons = {}; // service_id -> Set(indeksesh të shtesave opsionale të zgjedhura)
let orderIdem = ""; // çelës idempotence për porosinë (rivendoset kur hapet forma)
function uuid() { return (crypto && crypto.randomUUID) ? crypto.randomUUID() : "xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx".replace(/[xy]/g, (c) => { const r = Math.random() * 16 | 0; return (c === "x" ? r : (r & 0x3 | 0x8)).toString(16); }); }
let selDate = "", selTime = "";
const BASE = location.href.split("?")[0].replace(/[^/]*$/, "");

function unitPrice(item, qty) {
  let best = Number(item.price) || 0, bq = -1;
  for (const t of (DATA.tiers || [])) {
    if (t.service_id === item.id && Number(t.min_qty) <= qty && Number(t.min_qty) > bq) { best = Number(t.unit_price) || 0; bq = Number(t.min_qty); }
  }
  return best;
}

async function init() {
  const bid = new URLSearchParams(location.search).get("b");
  $("#loadingTxt").textContent = tr("loading");
  $("#poweredTxt").textContent = tr("powered");
  if (!bid) { fail(); return; }
  try {
    const { data, error } = await sb.rpc("public_business", { bid });
    if (error || !data) { fail(); return; }
    DATA = data;
    SQ = (DATA.lang || "sq") !== "en";
    document.documentElement.lang = SQ ? "sq" : "en";
    document.title = DATA.name + " — OptimaBook";
    $("#poweredTxt").textContent = tr("powered");
    render();
  } catch (e) { fail(); }
}
function fail() { $("#card").innerHTML = `<div class="pub-msg"><div class="big">🔍</div><p>${tr("notfound")}</p></div>`; }

function header() {
  return `<div class="pub-biz">${esc(DATA.name)}</div>${DATA.address ? `<div class="pub-addr">📍 ${esc(DATA.address)}</div>` : ""}`;
}

function render() {
  const mode = DATA.mode || "appointments";
  const canBook = mode !== "inquiry";                                              // takime ose të dyja
  const canOrder = !!(DATA.commerce_enabled || mode === "inquiry" || mode === "both"); // porosi/tregti
  if (canBook && canOrder) {
    // Të dyja → ndërrues Rezervo / Porosit
    $("#card").innerHTML = header() +
      `<div class="pub-switch"><button type="button" class="pub-sw active" id="swBook">📅 ${tr("book")}</button><button type="button" class="pub-sw" id="swOrder">🛒 ${tr("order")}</button></div><div id="pubBody"></div>`;
    const showBook = () => { $("#pubBody").innerHTML = bookUI(); wireBook(); $("#swBook").classList.add("active"); $("#swOrder").classList.remove("active"); };
    const showOrder = () => { $("#pubBody").innerHTML = orderUI(); wireOrder(); $("#swOrder").classList.add("active"); $("#swBook").classList.remove("active"); };
    $("#swBook").onclick = showBook; $("#swOrder").onclick = showOrder;
    showBook();
  } else if (canOrder) {
    $("#card").innerHTML = header() + orderUI(); wireOrder();
  } else {
    $("#card").innerHTML = header() + bookUI(); wireBook();
  }
}

/* ---------- Appointments ---------- */
function bookUI() {
  const svc = DATA.services.filter((s) => s.bookable !== false);
  const today = new Date().toISOString().slice(0, 10);
  return `
    <div class="pub-sec">${tr("book")}</div>
    <label class="f">${tr("service")}</label>
    <select id="bSvc">${svc.map((s) => `<option value="${s.id}">${esc(s.name)}${Number(s.price) ? " — " + money(s.price) : ""}</option>`).join("")}</select>
    <label class="f">${tr("date")}</label>
    <input type="date" id="bDate" min="${today}" value="${today}">
    <label class="f">${tr("pickSlot")}</label>
    <div class="slots" id="bSlots"></div>
    <label class="f">${tr("name")}</label>
    <input type="text" id="bName" maxlength="60">
    <label class="f">${tr("phone")}</label>
    <input type="text" id="bPhone" maxlength="40">
    <div class="pub-err" id="bErr"></div>
    <button class="btn primary big" id="bGo" style="width:100%;margin-top:14px">${tr("book")}</button>`;
}
function svcById(id) { return DATA.services.find((s) => s.id === id); }
function renderSlots() {
  const box = $("#bSlots"); selTime = "";
  selDate = $("#bDate").value;
  const d = new Date(selDate + "T00:00:00");
  const dow = d.getDay();
  const h = (DATA.hours || []).find((x) => x.weekday === dow);
  if (!h || h.is_closed || !h.open_time) { box.innerHTML = `<div style="color:var(--ink-soft);font-weight:600;font-size:13px">${tr("closed")}</div>`; return; }
  const svc = svcById($("#bSvc").value);
  const dur = Math.max(5, (svc && svc.duration_min) || 30);
  const step = Math.min(120, Math.max(15, dur));
  const toMin = (t) => { const [a, b] = String(t).split(":"); return +a * 60 + +b; };
  const open = toMin(h.open_time), close = toMin(h.close_time);
  // Intervalet e zëna: takimet (me kohëzgjatjen e tyre) + bllokimet + pushimet
  const intervals = [];
  (DATA.busy || []).filter((x) => x.d === selDate).forEach((x) => {
    const s = toMin((x.t || "").slice(0, 5)); intervals.push([s, s + (Number(x.dur) || 30)]);
  });
  (DATA.blocks || []).filter((x) => x.d === selDate).forEach((x) => {
    intervals.push([toMin((x.f || "").slice(0, 5)), toMin((x.t || "").slice(0, 5))]);
  });
  const cfg = DATA.config || {};
  const brks = (cfg.breaks && (cfg.breaks[dow] != null ? cfg.breaks[dow] : cfg.breaks[String(dow)])) || [];
  (Array.isArray(brks) ? brks : [brks]).forEach((b) => { if (b && b.start && b.end) intervals.push([toMin(b.start), toMin(b.end)]); });
  const now = new Date(); const isToday = selDate === now.toISOString().slice(0, 10);
  const nowMin = now.getHours() * 60 + now.getMinutes();
  // Gjenerimi i sloteve = i njëjti motor i testuar (core.js) si te paneli
  const slots = OB.computeSlots({ openMin: open, closeMin: close, durMin: dur, stepMin: step, busy: intervals, nowMin: isToday ? nowMin : null });
  let html = "";
  for (const hmv of slots) html += `<button type="button" class="slot-btn" data-t="${hmv}">${hmv}</button>`;
  box.innerHTML = html || `<div style="color:var(--ink-soft);font-weight:600;font-size:13px">${tr("noSlots")}</div>`;
  box.querySelectorAll(".slot-btn").forEach((b) => b.onclick = () => {
    box.querySelectorAll(".slot-btn").forEach((x) => x.classList.remove("sel"));
    b.classList.add("sel"); selTime = b.dataset.t;
  });
}
function wireBook() {
  $("#bSvc").onchange = renderSlots;
  $("#bDate").onchange = renderSlots;
  renderSlots();
  $("#bGo").onclick = async () => {
    const name = $("#bName").value.trim();
    if (!name) { $("#bErr").textContent = tr("needName"); return; }
    if (!selTime) { $("#bErr").textContent = tr("needSlot"); return; }
    $("#bErr").textContent = ""; $("#bGo").disabled = true;
    try {
      const { data, error } = await sb.rpc("public_book", { bid: DATA.id, p_service: $("#bSvc").value, p_name: name, p_phone: $("#bPhone").value.trim(), p_date: selDate, p_time: selTime });
      if (error || !data || !data.ok) {
        $("#bGo").disabled = false;
        $("#bErr").textContent = data && data.error === "slot_taken" ? tr("slotTaken") : (data && data.error === "rate" ? tr("rate") : tr("failed"));
        if (data && data.error === "slot_taken") { DATA.busy.push({ d: selDate, t: selTime }); renderSlots(); }
        return;
      }
      done(tr("okBook"), tr("okBookP"), BASE + "track.html?a=" + data.id);
    } catch (e) { $("#bGo").disabled = false; $("#bErr").textContent = tr("failed"); }
  };
}

/* ---------- Orders / commerce ---------- */
function orderUI() {
  orderIdem = uuid(); // çelës i ri idempotence sa herë hapet forma e porosisë
  const items = DATA.services;
  return `
    <div class="pub-sec">${tr("order")}</div>
    <div id="oItems">${items.map(itemRow).join("")}</div>
    <div class="cart-total"><span>${tr("total")}</span><b id="oTotal">${money(0)}</b></div>
    <label class="f">${tr("name")}</label>
    <input type="text" id="oName" maxlength="60">
    <label class="f">${tr("contact")}</label>
    <input type="text" id="oContact" maxlength="60">
    <label class="f">${tr("notes")}</label>
    <textarea id="oNotes" rows="2" maxlength="300"></textarea>
    <div class="pub-err" id="oErr"></div>
    <button class="btn primary big" id="oGo" style="width:100%;margin-top:14px">${tr("send")}</button>`;
}
function itemRow(s) {
  const cfg = DATA.config || {};
  const showDesc = OB.fieldVisible("desc", s.hidden_fields, cfg.catDesc !== false);
  const showUnit = OB.fieldVisible("unit", s.hidden_fields, cfg.catUnit !== false);
  const showAddons = OB.fieldVisible("addons", s.hidden_fields, true);
  const adds = (showAddons && Array.isArray(s.addons)) ? s.addons : [];
  const addHtml = adds.length ? `<div class="pi-addons">${adds.map((a, i) => a.required
    ? `<div class="pi-addon req">+ ${esc(a.name)} ${money(a.price)} · ${tr("addonInc")}</div>`
    : `<label class="pi-addon"><input type="checkbox" data-addon="${s.id}" data-i="${i}"> + ${esc(a.name)} ${money(a.price)}</label>`
  ).join("")}</div>` : "";
  return `<div class="pub-item">
    <div class="pi-grow">
      <div class="pi-name">${esc(s.name)}</div>
      ${showDesc && s.description ? `<div class="pi-desc">${esc(s.description)}</div>` : ""}
      <div class="pi-price">${money(s.price)}${showUnit && s.unit_label ? " / " + esc(s.unit_label) : ""}</div>
      ${addHtml}
    </div>
    <div class="qty">
      <button type="button" data-m="${s.id}">−</button>
      <span id="q-${s.id}">0</span>
      <button type="button" data-p="${s.id}">+</button>
    </div>
  </div>`;
}
function recompute() {
  let total = 0;
  for (const id in cart) {
    const it = svcById(id); if (!it) continue;
    const qty = cart[id];
    total += unitPrice(it, qty) * qty;
    const adds = Array.isArray(it.addons) ? it.addons : [];
    adds.forEach((a, i) => { if (a.required || (cartAddons[id] && cartAddons[id].has(i))) total += (Number(a.price) || 0) * qty; });
  }
  $("#oTotal").textContent = money(total);
}
function wireOrder() {
  $("#oItems").querySelectorAll("button[data-p]").forEach((b) => b.onclick = () => { const id = b.dataset.p; cart[id] = (cart[id] || 0) + 1; $("#q-" + id).textContent = cart[id]; recompute(); });
  $("#oItems").querySelectorAll("button[data-m]").forEach((b) => b.onclick = () => { const id = b.dataset.m; cart[id] = Math.max(0, (cart[id] || 0) - 1); $("#q-" + id).textContent = cart[id]; if (!cart[id]) delete cart[id]; recompute(); });
  $("#oItems").querySelectorAll("input[data-addon]").forEach((c) => c.onchange = () => {
    const id = c.dataset.addon, i = +c.dataset.i;
    (cartAddons[id] = cartAddons[id] || new Set());
    if (c.checked) cartAddons[id].add(i); else cartAddons[id].delete(i);
    recompute();
  });
  $("#oGo").onclick = async () => {
    const items = Object.keys(cart).map((id) => {
      const it = svcById(id); const adds = (it && Array.isArray(it.addons)) ? it.addons : [];
      const sel = cartAddons[id] ? [...cartAddons[id]].map((i) => adds[i] && adds[i].name).filter(Boolean) : [];
      return { service_id: id, qty: cart[id], addons: sel };
    });
    if (!items.length) { $("#oErr").textContent = tr("needItems"); return; }
    const name = $("#oName").value.trim();
    if (!name) { $("#oErr").textContent = tr("needName"); return; }
    $("#oErr").textContent = ""; $("#oGo").disabled = true;
    try {
      const { data, error } = await sb.rpc("public_order", { bid: DATA.id, p_name: name, p_contact: $("#oContact").value.trim(), p_items: items, p_notes: $("#oNotes").value.trim(), p_idem: orderIdem });
      if (error || !data || !data.ok) { $("#oGo").disabled = false; $("#oErr").textContent = (data && data.error === "rate") ? tr("rate") : tr("failed"); return; }
      done(tr("okOrder"), tr("okOrderP"), BASE + "track.html?o=" + data.id);
    } catch (e) { $("#oGo").disabled = false; $("#oErr").textContent = tr("failed"); }
  };
}

function done(title, p, trackUrl) {
  $("#card").innerHTML = `<div class="pub-msg"><div class="big">✅</div><h2>${title}</h2><p>${p}</p>
    ${trackUrl ? `<a class="btn primary" style="margin-top:16px;text-decoration:none" href="${trackUrl}">${tr("track")}</a>` : ""}
    <button class="btn" style="margin-top:10px" onclick="location.reload()">${tr("another")}</button></div>`;
}

if ("serviceWorker" in navigator && location.protocol === "https:") {
  window.addEventListener("load", function () { navigator.serviceWorker.register("sw.js").catch(function () {}); });
}
init();
</script>
</body>
</html>
